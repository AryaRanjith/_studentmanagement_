<div class="card p-3 bg-white">
    <h4 class="mb-3">Your Marks</h4>

    {% if marks %}
    <table class="table">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Mark</th>
                <th>Uploaded By</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for m in marks %}
            <tr>
                <td>{{ m.subject }}</td>
                <td>{{ m.mark }}</td>
                <td>{{ m.uploaded_by.username }}</td>
                <td>{{ m.uploaded_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p class="text-danger fw-bold">No marks uploaded yet.</p>
    {% endif %}
</div>
