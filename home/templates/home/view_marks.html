{% extends "home/base_student.html" %}
{% block content %}
<h2>Marks / Results</h2>
<table class="table table-striped mt-3">
    <thead>
        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Total Marks</th>
        </tr>
    </thead>
    <tbody>
        {% for mark in marks %}
        <tr>
            <td>{{ mark.subject.subject_name }}</td>
            <td>{{ mark.marks_obtained }}</td>
            <td>{{ mark.total_marks }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
