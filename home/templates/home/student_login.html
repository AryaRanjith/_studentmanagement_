<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{font-family:Arial;background:#f4f4f4}
    .card{border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);padding:20px}
    input{border:2px solid #000;border-radius:8px;padding:8px}
    .toggle-btn{cursor:pointer;font-weight:bold;margin:0 10px}
    .active-tab{text-decoration:underline}
</style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
<div class="col-md-4">
<div class="card bg-white">

<h3 class="text-center mb-3">Student Portal</h3>

<!-- Tabs -->
<div class="text-center mb-3">
    <span id="loginTab" class="toggle-btn active-tab" onclick="showLogin()">Login</span> |
    <span id="signupTab" class="toggle-btn" onclick="showSignup()">Signup</span>
</div>

<!-- LOGIN FORM -->
<div id="loginForm">
<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" class="form-control mb-2" required>
    <input type="password" name="password" placeholder="Password" class="form-control mb-2" required>
    <button type="submit" name="login" class="btn btn-dark w-100 mt-2">Login</button>
</form>
</div>

<!-- SIGNUP FORM -->
<div id="signupForm" style="display:none">
<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Create Username" class="form-control mb-2" required>
    <input type="email" name="email" placeholder="Email" class="form-control mb-2" required>
    <input type="password" name="password1" placeholder="Create Password" class="form-control mb-2" required>
    <input type="password" name="password2" placeholder="Confirm Password" class="form-control mb-2" required>
    <button type="submit" name="signup" class="btn btn-dark w-100 mt-2">Register</button>
</form>
</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger mt-3">{{ message }}</div>
    {% endfor %}
{% endif %}

</div>
</div>
</div>
</div>

<script>
function showLogin(){
    document.getElementById('loginForm').style.display="block";
    document.getElementById('signupForm').style.display="none";
    document.getElementById('loginTab').classList.add('active-tab');
    document.getElementById('signupTab').classList.remove('active-tab');
}
function showSignup(){
    document.getElementById('loginForm').style.display="none";
    document.getElementById('signupForm').style.display="block";
    document.getElementById('signupTab').classList.add('active-tab');
    document.getElementById('loginTab').classList.remove('active-tab');
}
</script>

</body>
</html>
