{% extends 'home/base.html' %}

{% block content %}

<h3 class="mb-3">Student List</h3>

<table class="table table-bordered table-hover bg-white">
    <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone No</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Action</th>  <!-- for Edit button -->
        </tr>
    </thead>

    <tbody>
        {% for student in students %}   <!-- students comes from view -->
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.phone }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.subject }}</td>
            <td>{{ student.mark }}</td>
            <td>
                <a class="btn btn-sm btn-outline-dark" href="{% url 'edit_student' student.id %}">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
